services:    
  coraza:
    user: "${PUID}:${GUID}"
    build:
      context: ./coraza
      dockerfile: Dockerfile
    environment:
      - WAF_APP_URL=${WAF_APP_URL}
      - WAF_LOG_FILE=${WAF_LOG_FILE}
      - WAF_STRICT_OVERRIDE=${WAF_STRICT_OVERRIDE}
      - WAF_API_BASEPATH=${WAF_API_BASEPATH}
      - WAF_BYPASS_FILE=${WAF_BYPASS_FILE}
      - WAF_BOT_DEFENSE_FILE=${WAF_BOT_DEFENSE_FILE}
      - WAF_SEMANTIC_FILE=${WAF_SEMANTIC_FILE}
      - WAF_RULES_FILE=${WAF_RULES_FILE}
      - WAF_API_KEY_PRIMARY=${WAF_API_KEY_PRIMARY}
      - WAF_API_KEY_SECONDARY=${WAF_API_KEY_SECONDARY}
      - WAF_API_AUTH_DISABLE=${WAF_API_AUTH_DISABLE}
      - WAF_API_CORS_ALLOWED_ORIGINS=${WAF_API_CORS_ALLOWED_ORIGINS}
      - WAF_CRS_ENABLE=${WAF_CRS_ENABLE}
      - WAF_CRS_SETUP_FILE=${WAF_CRS_SETUP_FILE}
      - WAF_CRS_RULES_DIR=${WAF_CRS_RULES_DIR}
      - WAF_CRS_DISABLED_FILE=${WAF_CRS_DISABLED_FILE}
      - WAF_FP_TUNER_MODE=${WAF_FP_TUNER_MODE:-mock}
      - WAF_FP_TUNER_ENDPOINT=${WAF_FP_TUNER_ENDPOINT:-}
      - WAF_FP_TUNER_API_KEY=${WAF_FP_TUNER_API_KEY:-}
      - WAF_FP_TUNER_MODEL=${WAF_FP_TUNER_MODEL:-}
      - WAF_FP_TUNER_TIMEOUT_SEC=${WAF_FP_TUNER_TIMEOUT_SEC:-15}
      - WAF_FP_TUNER_MOCK_RESPONSE_FILE=${WAF_FP_TUNER_MOCK_RESPONSE_FILE:-conf/fp-tuner-mock-response.json}
      - WAF_FP_TUNER_REQUIRE_APPROVAL=${WAF_FP_TUNER_REQUIRE_APPROVAL:-true}
      - WAF_FP_TUNER_APPROVAL_TTL_SEC=${WAF_FP_TUNER_APPROVAL_TTL_SEC:-600}
      - WAF_FP_TUNER_AUDIT_FILE=${WAF_FP_TUNER_AUDIT_FILE:-logs/coraza/fp-tuner-audit.ndjson}
      - WAF_ALLOW_INSECURE_DEFAULTS=${WAF_ALLOW_INSECURE_DEFAULTS}
    volumes:
      - ./data/rules:/app/rules
      - ./data/conf:/app/conf
      - ./data/logs:/app/logs
    ports:
      - "${CORAZA_PORT:-9090}:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -T 2 -O /dev/null http://127.0.0.1:9090/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: unless-stopped
  nginx:
    cap_add: ["NET_BIND_SERVICE"]
    user: "${PUID}:${GUID}"
    build:
      context: ./nginx
      dockerfile: Dockerfile
      args:
        NGX_CORAZA_UPSTREAM: ${NGX_CORAZA_UPSTREAM}
        NGX_BACKEND_RESPONSE_TIMEOUT: ${NGX_BACKEND_RESPONSE_TIMEOUT}
        NGX_CORAZA_ADMIN_URL: ${NGX_CORAZA_ADMIN_URL}
        NGX_CORAZA_API_BASEPATH: ${NGX_CORAZA_API_BASEPATH}
        PUID: ${PUID}
        GUID: ${GUID}
    ports:
      - "${NGINX_PORT:-${OPENRESTY_PORT:-80}}:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./nginx/waf:/etc/nginx/waf:ro
      - ./data/logs/nginx:/data/logs/nginx
    depends_on:
      coraza:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -T 2 -O /dev/null http://127.0.0.1/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: unless-stopped
  gotestwaf:
    image: wallarm/gotestwaf:0.5.8@sha256:ff7184da90029a98c87bfdbadcee544c979b999593175d17b2d38f642ee29977
    user: "${PUID}:${GUID}"
    profiles: ["waf-test"]
    depends_on:
      coraza:
        condition: service_healthy
      nginx:
        condition: service_healthy
    command:
      - --url=http://nginx:80
      - --wafName=mamotama
      - --reportFormat=json
      - --reportPath=/app/reports
      - --reportName=gotestwaf-report
      - --noEmailReport
    volumes:
      - ./data/logs/gotestwaf:/app/reports
    restart: "no"
  web:
    image: node:22
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./web/mamotama-admin:/app
      - web_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_CORAZA_API_BASE=${VITE_CORAZA_API_BASE}
      - VITE_APP_BASE_PATH=${VITE_APP_BASE_PATH}
      - VITE_API_KEY=${VITE_API_KEY}
    restart: unless-stopped

volumes:
  web_node_modules:
