name: ci

on:
  push:
  pull_request:

jobs:
  go-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: coraza/src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.7"
          cache-dependency-path: coraza/src/go.sum
      - name: Run unit tests
        run: go test ./...

  ui-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/mamotama-admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/mamotama-admin/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run UI tests
        run: npm test

  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker compose
        run: docker compose config >/dev/null
